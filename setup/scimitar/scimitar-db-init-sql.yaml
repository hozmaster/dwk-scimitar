# ConfigMap with your SQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: scimitar-init-sql
  namespace: postgres
data:
  01-create-users.sql: |
    CREATE USER scimntair WITH PASSWORD 'verysecret';
  02-create-dbs.sql: |
    CREATE DATABASE scimitar OWNER scimntair;
  03-grant-access-dbs.sql: |
    CREATE ROLE scicrud;
    GRANT ALL PRIVILEGES on database scimitar to scicrud;
    GRANT scicrud TO scimntair;
  04-create-todo-table.sql: |
    CREATE TABLE IF NOT EXISTS pingpong (
        id int GENERATED BY DEFAULT AS IDENTITY,
        count int not null
    );
  05-insert-default-record.sql: |
     insert into pingpong (count) VALUES (0);