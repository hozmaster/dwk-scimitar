apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: matsubokkuri/scimitar-app:2.5
          imagePullPolicy: IfNotPresent
          env:
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: exercise-config
                  key: message
          volumeMounts:
            - mountPath: /config
              name: information-volume
              readOnly: true
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 30
            httpGet:
              port: 2346
              path: /pings
      volumes:
        - name: information-volume
          configMap:
            name: exercise-config
            items:
              - key: information.txt
                path: information.txt

      restartPolicy: Always
