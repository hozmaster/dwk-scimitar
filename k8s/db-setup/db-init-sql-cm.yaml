# Initialize the scimitar db to ready to use
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init-sql-cm
  namespace: exercises
data:
  01-create-todo-table.sql: |
    CREATE TABLE IF NOT EXISTS pingpong (
        id int GENERATED BY DEFAULT AS IDENTITY,
        count int not null
    );
  02-alter-table-owner.sql: |
    ALTER TABLE pingpong OWNER TO scicrud;
  03-insert-default-record.sql: |
    insert into pingpong (count) VALUES (0);
